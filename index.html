<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do You Really Like Me?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="love-zone">
      <h1 id="main-text">Do you really like me? 💕</h1>

      <div class="gif-stage">
        <img
          id="hamster-gif"
          class="hamster"
          src="assets/hamster-neutral.svg"
          alt="Cute hamster reacting"
        >
        <img
          id="teddy-gif"
          class="teddy hidden"
          src="assets/teddy-love.svg"
          alt="Cute teddy playing lovingly"
        >
        <div id="hearts" class="hearts hidden" aria-hidden="true">
          <span>💕</span>
          <span>💖</span>
          <span>💗</span>
          <span>💘</span>
          <span>💕</span>
          <span>💞</span>
        </div>
      </div>

      <div id="button-row" class="button-row">
        <button id="yes-btn" class="btn btn-yes" type="button">Yes</button>
        <button id="no-btn" class="btn btn-no" type="button">No</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
